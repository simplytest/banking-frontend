on:
  push:
  pull_request:
  workflow_dispatch:

name: 🧪 Continuous Integration

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🍃 Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 🍃 Install pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb
        with:
          run_install: false

      - name: 🏗️ Install Dependencies
        run: |
          pnpm install

      - name: 👟 Start Frontend and Backend
        run: |
          docker pull ghcr.io/simplytest/banking-backend:latest
          docker run -d -p 5005:5005 -e "SIMPLYTEST_DEMO=ON" --rm --name=Banking-Backend-Demo ghcr.io/simplytest/banking-backend:latest

          pnpm run start > log.txt 2>&1 &

      - name: ⌛ Wait for Frontend
        uses: iFaxity/wait-on-action@a7d13170ec542bdca4ef8ac4b15e9c6aa00a6866
        with:
          resource: http://localhost:4200
          delay: 1000
          httpTimeout: 500
          timeout: 60000

      - name: 🧪 Integration Tests
        run: |
          pnpm run test:int

      - name: 🧪 End To End Tests
        run: |
          pnpm run test:e2e

      - name: 🔍 Check for duplicate reports
        id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf
        with:
          skip_after_successful_duplicate: true
          concurrent_skipping: "same_content_newer"

      - name: 📋 Integration Test Report
        uses: phoenix-actions/test-reporting@f957cd93fc2d848d556fa0d03c57bc79127b6b5e
        if: steps.skip_check.outputs.should_skip != 'true' && (success() || failure())
        with:
          name: 📋 Integration Test Report
          reporter: java-junit
          path: "results/integration*.xml"

      - name: 📋 E2E Test Report
        uses: phoenix-actions/test-reporting@f957cd93fc2d848d556fa0d03c57bc79127b6b5e
        if: steps.skip_check.outputs.should_skip != 'true' && (success() || failure())
        with:
          name: 📋 E2E Test Report
          reporter: java-junit
          path: "results/e2e*.xml"

      - name: 👀 Sonar Scan
        if: github.ref == 'refs/heads/main'
        uses: sonarsource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONARQUBE_HOST }}

      - name: 🤖 Sonar Summary
        if: github.ref == 'refs/heads/main'
        run: |
          {
            echo "### 🤖 Sonar Summary"
            echo "${{ vars.SONARQUBE_HOST }}"
          } >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Upload PNPM Logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: PNPM Log
          path: log.txt
